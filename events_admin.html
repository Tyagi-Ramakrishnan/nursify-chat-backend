<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events Admin — Nursify Aesthetics</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent:  #ff69b4;
  --deep:    #d4538f;
  --bg:      #fdf8f9;
  --text:    #6b6065;
  --dark:    #2a2a2a;
  --border:  rgba(255,105,180,0.15);
  --radius:  4px;
  --shadow:  0 2px 4px rgba(0,0,0,0.06);
}
body { font-family:'Montserrat',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* ── Login ── */
#login-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
.login-wrap { width:100%; max-width:380px; }
.login-logo { text-align:center; margin-bottom:28px; }
.login-logo h1 { font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:400; color:var(--dark); }
.login-logo p { font-size:10px; font-weight:600; letter-spacing:0.16em; text-transform:uppercase; color:var(--accent); margin-top:4px; }
.card { background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); border:1px solid var(--border); padding:32px 28px; }
.field { margin-bottom:18px; }
.field label { display:block; font-size:10px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--text); margin-bottom:7px; }
input[type="password"], input[type="text"], input[type="date"], input[type="datetime-local"], textarea, select {
  width:100%; padding:11px 13px; font-family:'Montserrat',sans-serif; font-size:13px; color:var(--dark);
  background:#fafafa; border:1px solid var(--border); border-radius:var(--radius);
  appearance:none; -webkit-appearance:none; outline:none; transition:border-color 0.2s,box-shadow 0.2s;
}
input:focus, textarea:focus, select:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(255,105,180,0.10); background:#fff; }
textarea { resize:vertical; min-height:80px; line-height:1.5; }
.btn { display:inline-flex; align-items:center; gap:6px; padding:10px 20px; border:none; border-radius:var(--radius);
  font-family:'Montserrat',sans-serif; font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase;
  cursor:pointer; transition:opacity 0.2s; }
.btn:disabled { opacity:0.5; cursor:default; }
.btn-primary { background:linear-gradient(135deg,var(--accent),var(--deep)); color:#fff; }
.btn-primary:hover:not(:disabled) { opacity:0.88; }
.btn-secondary { background:#fff; color:var(--text); border:1px solid var(--border); }
.btn-secondary:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
.btn-danger { background:#fff; color:#c0392b; border:1px solid rgba(192,57,43,0.25); }
.btn-danger:hover:not(:disabled) { background:#fff0f0; }
.btn-archive { background:#fff; color:#8b6914; border:1px solid rgba(139,105,20,0.25); }
.btn-archive:hover:not(:disabled) { background:#fffbf0; }
.badge-archived { background:rgba(139,105,20,0.10); color:#8b6914; }
.row-archived td { opacity:0.55; }
.btn-full { width:100%; justify-content:center; padding:13px; }
.alert { padding:10px 14px; border-radius:var(--radius); font-size:12px; margin-bottom:14px; }
.alert-error { background:#fff0f4; border:1px solid rgba(212,83,143,0.3); color:#c0392b; }
.alert-success { background:#f0fff4; border:1px solid rgba(0,180,80,0.25); color:#1a7a3a; }

/* ── Admin layout ── */
#admin-screen { display:none; }
.top-bar { background:#fff; border-bottom:1px solid var(--border); padding:16px 28px; display:flex; align-items:center; justify-content:space-between; }
.top-bar h1 { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:400; color:var(--dark); }
.top-bar-right { display:flex; align-items:center; gap:12px; }
.admin-body { max-width:1100px; margin:0 auto; padding:28px 24px 60px; }

/* ── Section ── */
.section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
.section-title { font-size:12px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--text); }

/* ── Table ── */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:12px; }
th { padding:9px 12px; text-align:left; font-size:10px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:#bbb; border-bottom:1px solid var(--border); background:#fafafa; white-space:nowrap; }
td { padding:10px 12px; border-bottom:1px solid var(--border); vertical-align:middle; color:var(--dark); }
tr:last-child td { border-bottom:none; }
tr:hover td { background:rgba(255,105,180,0.02); }
.badge { display:inline-block; font-size:10px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; padding:2px 9px; border-radius:20px; }
.badge-active { background:rgba(0,180,80,0.10); color:#1a7a3a; }
.badge-inactive { background:rgba(0,0,0,0.06); color:#999; }
.table-actions { display:flex; gap:6px; }

/* ── Panel ── */
.panel { background:#fff; border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:24px; overflow:hidden; }
.panel-head { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
.panel-head h2 { font-size:14px; font-weight:500; color:var(--dark); }
.panel-body { padding:0; }

/* ── Modal ── */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:100; align-items:center; justify-content:center; padding:20px; }
.modal-overlay.open { display:flex; }
.modal { background:#fff; border-radius:var(--radius); box-shadow:0 8px 32px rgba(0,0,0,0.14); width:100%; max-width:500px; max-height:90vh; overflow-y:auto; }
.modal-head { padding:20px 24px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-head h2 { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:400; color:var(--dark); }
.modal-close { background:none; border:none; font-size:20px; cursor:pointer; color:var(--text); line-height:1; padding:2px 6px; }
.modal-close:hover { color:var(--accent); }
.modal-body { padding:24px; }
.modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; }

/* ── Registrations back btn ── */
.back-btn { background:none; border:none; cursor:pointer; font-family:'Montserrat',sans-serif; font-size:12px; color:var(--accent); display:flex; align-items:center; gap:6px; margin-bottom:18px; padding:0; }
.back-btn:hover { text-decoration:underline; }
#regs-panel { display:none; }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-logo">
      <h1>Nursify Aesthetics</h1>
      <p>Events Admin</p>
    </div>
    <div class="card">
      <div id="login-error" class="alert alert-error" style="display:none"></div>
      <div class="field">
        <label for="pw-input">Admin Password</label>
        <input type="password" id="pw-input" placeholder="Enter password" autocomplete="current-password">
      </div>
      <button class="btn btn-primary btn-full" id="login-btn">Sign In</button>
    </div>
  </div>
</div>

<!-- Admin -->
<div id="admin-screen">
  <div class="top-bar">
    <h1>Events Admin</h1>
    <div class="top-bar-right">
      <button class="btn btn-primary" id="create-btn">+ New Event</button>
      <button class="btn btn-secondary" id="logout-btn">Sign out</button>
    </div>
  </div>

  <div class="admin-body">

    <!-- Events list -->
    <div id="events-panel">
      <div class="panel">
        <div class="panel-head">
          <h2>All Events</h2>
          <div style="display:flex;align-items:center;gap:16px;">
            <label style="display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text);cursor:pointer;user-select:none;">
              <input type="checkbox" id="show-archived-toggle" style="accent-color:var(--accent);width:14px;height:14px;">
              Show archived
            </label>
            <span id="event-count" style="font-size:12px;color:#bbb;"></span>
          </div>
        </div>
        <div class="panel-body table-wrap">
          <table id="events-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Event Date</th>
                <th>Deadline</th>
                <th>Registrations</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="events-tbody">
              <tr><td colspan="6" style="text-align:center;padding:32px;color:#bbb;">Loading&hellip;</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Registrations view -->
    <div id="regs-panel">
      <button class="back-btn" id="back-btn">&#8592; Back to Events</button>
      <div class="panel">
        <div class="panel-head">
          <h2 id="regs-title">Registrations</h2>
          <div style="display:flex;gap:8px;align-items:center;">
            <span id="regs-count" style="font-size:12px;color:#bbb;"></span>
            <button class="btn btn-secondary" id="csv-btn">Export CSV</button>
          </div>
        </div>
        <div class="panel-body table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Date of Birth</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Referral</th>
                <th>Registered</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="regs-tbody">
              <tr><td colspan="8" style="text-align:center;padding:32px;color:#bbb;">Select an event to view registrations.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Create / Edit modal -->
<div class="modal-overlay" id="event-modal">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modal-title">New Event</h2>
      <button class="modal-close" id="modal-close-btn">&times;</button>
    </div>
    <div class="modal-body">
      <div id="modal-alert" class="alert" style="display:none"></div>
      <div class="field">
        <label for="m-name">Event Name</label>
        <input type="text" id="m-name" placeholder="Nursify Tox Party">
      </div>
      <div class="field">
        <label for="m-date">Event Date &amp; Time</label>
        <input type="datetime-local" id="m-date">
      </div>
      <div class="field">
        <label for="m-deadline">Registration Deadline</label>
        <input type="datetime-local" id="m-deadline">
      </div>
      <div class="field">
        <label for="m-description">Description (optional)</label>
        <textarea id="m-description" placeholder="Event details…"></textarea>
      </div>
      <div class="field">
        <label for="m-clearance">Medical Clearance Note (optional)</label>
        <textarea id="m-clearance" placeholder="Medical clearance required by…"></textarea>
      </div>
      <div class="field">
        <label for="m-active">Status</label>
        <select id="m-active">
          <option value="true">Active — accepting registrations</option>
          <option value="false">Inactive — closed</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="modal-cancel-btn">Cancel</button>
      <button class="btn btn-primary" id="modal-save-btn">Save Event</button>
    </div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────
var API_BASE_URL = '';

// ── State ───────────────────────────────────────────────────────────
var password = '';
var editingEventId = null;
var viewingEventId = null;

function authHeader() {
  return 'Basic ' + btoa('admin:' + password);
}

function apiFetch(path, opts) {
  opts = opts || {};
  opts.headers = opts.headers || {};
  opts.headers['Authorization'] = authHeader();
  if (opts.json) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(opts.json);
    delete opts.json;
  }
  return fetch(API_BASE_URL + path, opts);
}

function fmt(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('en-US', {
    month:'short', day:'numeric', year:'numeric',
    hour:'numeric', minute:'2-digit'
  });
}
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso + 'T00:00:00').toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'});
}

// ── Login ────────────────────────────────────────────────────────────
document.getElementById('login-btn').addEventListener('click', function() {
  var pw = document.getElementById('pw-input').value.trim();
  if (!pw) return;
  password = pw;
  var btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Signing in…';
  apiFetch('/events/admin/list')
    .then(function(r) {
      if (r.ok) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-screen').style.display = 'block';
        loadEvents();
      } else {
        password = '';
        var el = document.getElementById('login-error');
        el.textContent = 'Incorrect password.'; el.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    })
    .catch(function() {
      password = '';
      var el = document.getElementById('login-error');
      el.textContent = 'Could not connect.'; el.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Sign In';
    });
});
document.getElementById('pw-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});
document.getElementById('logout-btn').addEventListener('click', function() {
  password = '';
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pw-input').value = '';
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('login-btn').textContent = 'Sign In';
  document.getElementById('login-btn').disabled = false;
});

// ── Events list ──────────────────────────────────────────────────────
function loadEvents() {
  var includeArchived = document.getElementById('show-archived-toggle').checked;
  apiFetch('/events/admin/list' + (includeArchived ? '?include_archived=true' : ''))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var events = data.events || [];
      document.getElementById('event-count').textContent = events.length + ' event' + (events.length !== 1 ? 's' : '');
      var tbody = document.getElementById('events-tbody');
      if (!events.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:32px;color:#bbb;">No events yet.</td></tr>';
        return;
      }
      tbody.innerHTML = events.map(function(ev) {
        var statusBadge = ev.archived
          ? '<span class="badge badge-archived">Archived</span>'
          : ev.active
            ? '<span class="badge badge-active">Active</span>'
            : '<span class="badge badge-inactive">Inactive</span>';
        var actions = ev.archived
          ? '<button class="btn btn-secondary" onclick="viewRegs(\'' + ev.id + '\', \'' + esc(ev.name) + '\')">Registrations</button>'
          : '<button class="btn btn-secondary" onclick="openEdit(\'' + ev.id + '\')">Edit</button>' +
            '<button class="btn btn-secondary" onclick="viewRegs(\'' + ev.id + '\', \'' + esc(ev.name) + '\')">Registrations</button>' +
            '<button class="btn btn-danger" onclick="toggleActive(\'' + ev.id + '\',' + !ev.active + ')">' + (ev.active ? 'Deactivate' : 'Activate') + '</button>' +
            '<button class="btn btn-archive" onclick="archiveEvent(\'' + ev.id + '\', \'' + esc(ev.name) + '\')">Archive</button>';
        return '<tr class="' + (ev.archived ? 'row-archived' : '') + '">' +
          '<td style="font-weight:500;color:' + (ev.archived ? '#bbb' : ev.active ? 'var(--dark)' : '#bbb') + '">' + esc(ev.name) + '</td>' +
          '<td>' + fmt(ev.event_date) + '</td>' +
          '<td>' + fmt(ev.registration_deadline) + '</td>' +
          '<td style="text-align:center;">' + (ev.registration_count || 0) + '</td>' +
          '<td>' + statusBadge + '</td>' +
          '<td><div class="table-actions">' + actions + '</div></td>' +
        '</tr>';
      }).join('');
    })
    .catch(function() {
      document.getElementById('events-tbody').innerHTML =
        '<tr><td colspan="6" style="text-align:center;color:#c0392b;padding:24px;">Failed to load events.</td></tr>';
    });
}

document.getElementById('show-archived-toggle').addEventListener('change', loadEvents);

function toggleActive(id, active) {
  apiFetch('/events/admin/' + id, { method:'PATCH', json:{ active: active } })
    .then(function() { loadEvents(); });
}

function archiveEvent(id, name) {
  if (!confirm('Archive "' + name + '"?\n\nArchived events are hidden from the list and closed to new registrations. You can still view their registrations.')) return;
  apiFetch('/events/admin/' + id + '/archive', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.success) loadEvents();
      else alert('Archive failed: ' + (res.detail || 'Unknown error'));
    });
}

// ── Registrations ────────────────────────────────────────────────────
function viewRegs(eventId, eventName) {
  viewingEventId = eventId;
  document.getElementById('events-panel').style.display = 'none';
  document.getElementById('regs-panel').style.display = 'block';
  document.getElementById('regs-title').textContent = 'Registrations — ' + eventName;
  document.getElementById('regs-tbody').innerHTML =
    '<tr><td colspan="8" style="text-align:center;padding:32px;color:#bbb;">Loading&hellip;</td></tr>';
  document.getElementById('regs-count').textContent = '';

  apiFetch('/events/admin/' + eventId + '/registrations')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var regs = data.registrations || [];
      document.getElementById('regs-count').textContent = regs.length + ' registration' + (regs.length !== 1 ? 's' : '');
      var tbody = document.getElementById('regs-tbody');
      if (!regs.length) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:32px;color:#bbb;">No registrations yet.</td></tr>';
        return;
      }
      tbody.innerHTML = regs.map(function(r, i) {
        return '<tr id="reg-row-' + r.id + '">' +
          '<td style="color:#bbb;">' + (i + 1) + '</td>' +
          '<td style="font-weight:500;color:var(--dark)">' + esc(r.full_name) + '</td>' +
          '<td>' + fmtDate(r.dob) + '</td>' +
          '<td>' + esc(r.phone) + '</td>' +
          '<td>' + esc(r.email) + '</td>' +
          '<td>' + esc(r.referral_source) + '</td>' +
          '<td style="color:#bbb;">' + fmt(r.created_at) + '</td>' +
          '<td><button class="btn btn-danger" onclick="deleteReg(\'' + r.id + '\', \'' + esc(r.full_name) + '\')">Delete</button></td>' +
        '</tr>';
      }).join('');
    });
}

function deleteReg(regId, name) {
  if (!confirm('Delete registration for "' + name + '"? This cannot be undone.')) return;
  var btn = document.querySelector('[onclick="deleteReg(\'' + regId + '\', \'' + name.replace(/'/g, "\\'") + '\')"]');
  if (btn) { btn.disabled = true; btn.textContent = 'Deleting…'; }
  apiFetch('/events/admin/registrations/' + regId, { method: 'DELETE' })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.success) {
        var row = document.getElementById('reg-row-' + regId);
        if (row) { row.style.opacity = '0'; setTimeout(function() { row.remove(); }, 250); }
        var countEl = document.getElementById('regs-count');
        var m = countEl.textContent.match(/(\d+)/);
        if (m) {
          var n = Math.max(0, parseInt(m[1]) - 1);
          countEl.textContent = n + ' registration' + (n !== 1 ? 's' : '');
        }
      } else {
        if (btn) { btn.disabled = false; btn.textContent = 'Delete'; }
        alert('Delete failed: ' + (res.detail || 'Unknown error'));
      }
    })
    .catch(function() {
      if (btn) { btn.disabled = false; btn.textContent = 'Delete'; }
      alert('Network error.');
    });
}

document.getElementById('back-btn').addEventListener('click', function() {
  document.getElementById('regs-panel').style.display = 'none';
  document.getElementById('events-panel').style.display = 'block';
});

document.getElementById('csv-btn').addEventListener('click', function() {
  if (!viewingEventId) return;
  var url = API_BASE_URL + '/events/admin/' + viewingEventId + '/registrations?format=csv';
  // Trigger download with auth — fetch and create blob
  apiFetch('/events/admin/' + viewingEventId + '/registrations?format=csv')
    .then(function(r) { return r.blob(); })
    .then(function(blob) {
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'registrations_' + viewingEventId + '.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });
});

// ── Create / Edit modal ──────────────────────────────────────────────
function openModal() { document.getElementById('event-modal').classList.add('open'); }
function closeModal() {
  document.getElementById('event-modal').classList.remove('open');
  editingEventId = null;
  clearModalAlert();
  document.getElementById('m-name').value = '';
  document.getElementById('m-date').value = '';
  document.getElementById('m-deadline').value = '';
  document.getElementById('m-description').value = '';
  document.getElementById('m-clearance').value = '';
  document.getElementById('m-active').value = 'true';
}
function modalAlert(msg, type) {
  var el = document.getElementById('modal-alert');
  el.className = 'alert alert-' + type;
  el.textContent = msg;
  el.style.display = 'block';
}
function clearModalAlert() {
  document.getElementById('modal-alert').style.display = 'none';
}

function toLocalDT(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  var pad = function(n) { return String(n).padStart(2, '0'); };
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) +
    'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

document.getElementById('create-btn').addEventListener('click', function() {
  document.getElementById('modal-title').textContent = 'New Event';
  editingEventId = null;
  openModal();
});

function openEdit(id) {
  apiFetch('/events/admin/list')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var ev = (data.events || []).find(function(e) { return e.id === id; });
      if (!ev) return;
      editingEventId = id;
      document.getElementById('modal-title').textContent = 'Edit Event';
      document.getElementById('m-name').value = ev.name || '';
      document.getElementById('m-date').value = toLocalDT(ev.event_date);
      document.getElementById('m-deadline').value = toLocalDT(ev.registration_deadline);
      document.getElementById('m-description').value = ev.description || '';
      document.getElementById('m-clearance').value = ev.medical_clearance_note || '';
      document.getElementById('m-active').value = ev.active ? 'true' : 'false';
      openModal();
    });
}

document.getElementById('modal-close-btn').addEventListener('click', closeModal);
document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
document.getElementById('event-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.getElementById('modal-save-btn').addEventListener('click', function() {
  clearModalAlert();
  var name     = document.getElementById('m-name').value.trim();
  var date     = document.getElementById('m-date').value;
  var deadline = document.getElementById('m-deadline').value;
  if (!name || !date || !deadline) {
    modalAlert('Name, date, and deadline are required.', 'error'); return;
  }

  var payload = {
    name:                  name,
    event_date:            new Date(date).toISOString(),
    registration_deadline: new Date(deadline).toISOString(),
    description:           document.getElementById('m-description').value.trim() || null,
    medical_clearance_note: document.getElementById('m-clearance').value.trim() || null,
    active:                document.getElementById('m-active').value === 'true',
  };

  var btn = document.getElementById('modal-save-btn');
  btn.disabled = true; btn.textContent = 'Saving…';

  var req;
  if (editingEventId) {
    req = apiFetch('/events/admin/' + editingEventId, { method:'PATCH', json: payload });
  } else {
    req = apiFetch('/events/admin/create', { method:'POST', json: payload });
  }

  req.then(function(r) { return r.json().then(function(d) { return {ok:r.ok, data:d}; }); })
    .then(function(res) {
      btn.disabled = false; btn.textContent = 'Save Event';
      if (res.ok) { closeModal(); loadEvents(); }
      else { modalAlert(res.data.detail || 'Save failed.', 'error'); }
    })
    .catch(function() { btn.disabled = false; btn.textContent = 'Save Event'; modalAlert('Network error.', 'error'); });
});

// ── Util ─────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
